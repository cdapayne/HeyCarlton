<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carlton Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@5/dark.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
</head>
<body class="bg-gray-900 text-white">
  <div id="app">
    <aside id="sidebar">
      <section class="projects text-base">
        <button id="new-project-btn"><i class="fas fa-folder-plus"></i> New Project</button>
        <button id="open-codex"><i class="fas fa-book-open"></i> Open Codex</button>
        <h2 class="mt-4"><i class="fas fa-folder-open"></i> Projects</h2>
        <ul id="project-list" class="mt-2"></ul>
      </section>
    </aside>
    <main id="chat">
      <div id="amazon-ad-banner" class="w-full flex justify-center mb-2">
        <!-- Amazon Associates Native Shopping Ads placeholder -->
        <script type="text/javascript">
          amzn_assoc_ad_type = "responsive_search_widget";
          amzn_assoc_tracking_id = "YOUR_APP_ID";
          amzn_assoc_marketplace = "amazon";
          amzn_assoc_region = "US";
          amzn_assoc_default_search_phrase = "tech gadgets";
          amzn_assoc_default_category = "All";
          amzn_assoc_linkid = "YOUR_APP_KEY";
          amzn_assoc_placement = "adunit0";
          amzn_assoc_search_bar = "true";
          amzn_assoc_title = "Shop Related Products";
        </script>
        <script src="//z-na.amazon-adsystem.com/widgets/onejs?MarketPlace=US"></script>
      </div>
      <header class="flex items-center p-2 bg-gray-900 border-b border-gray-700 text-base">
        <button id="settings-btn" class="p-2 bg-gray-800 text-white rounded mr-2"><i class="fas fa-cog"></i></button>
        <img src="carlton-logo.svg" id="logo" alt="Carlton logo" class="w-10 h-10">
        <h1 id="main-title" class="text-xl font-bold mx-2">Hey! Carlton</h1>
        <div id="top-info" class="flex-1 text-gray-300"></div>
        <select id="model-select" class="bg-gray-800 text-white border border-gray-600 rounded p-1">
          <option value="gpt-4o-mini">gpt-4o-mini</option>
          <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
          <option value="gpt-4">gpt-4</option>
          <option value="gpt-5">gpt-5</option>
        </select>
        <span id="balance" class="ml-2 text-yellow-400"></span>
      </header>
      <div id="messages" class="flex-1 p-4 overflow-y-auto"></div>
      <div id="input-area" class="sticky bottom-0 flex flex-col bg-gray-900 border-t border-gray-700">
        <form id="prompt-form" class="flex gap-2 p-2 flex-col sm:flex-row">
          <input type="text" id="prompt-input" placeholder="Type your message" class="flex-1 p-2 bg-gray-800 text-white border border-gray-600 rounded">
          <button type="submit" class="p-2 bg-green-600 text-white rounded"><i class="fas fa-paper-plane"></i> Send</button>
        </form>
        <div id="rss-ticker" class="flex items-center bg-gray-800 text-white text-base">
          <span class="ticker-label px-2 py-1 bg-gray-700">PayneBrain News Ticker</span>
          <img src="carlton-logo.svg" id="ticker-logo" alt="Ticker logo" class="h-6 w-6 ml-2">
          <div id="rss-marquee" class="marquee p-2 flex-1"></div>
          <div id="weather" class="flex items-center px-2"></div>
          <div id="datetime" class="flex items-center px-2"></div>
        </div>
      </div>
    </main>
  </div>
  <div id="settings-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 items-center justify-center">
    <div class="bg-gray-800 p-4 rounded">
      <h3 class="mb-2 text-base">Settings</h3>
      <form id="settings-form" class="flex flex-col gap-2">
        <div id="rss-options" class="flex flex-col gap-2"></div>
        <div id="custom-feed" class="flex flex-col gap-2">
          <input type="text" id="custom-feed-name" class="p-1 bg-gray-700 text-white rounded" placeholder="Feed Name">
          <input type="text" id="custom-feed-url" class="p-1 bg-gray-700 text-white rounded" placeholder="Feed URL">
          <button type="button" id="add-feed-btn" class="p-2 bg-blue-600 text-white rounded"><i class="fas fa-plus"></i> Add Feed</button>
        </div>
        <label class="flex items-center gap-2">Zip Code
          <input type="text" id="zip-input" class="p-1 bg-gray-700 text-white rounded w-24" placeholder="e.g. 10001">
        </label>
        <button type="submit" class="p-2 bg-green-600 text-white rounded"><i class="fas fa-save"></i> Save</button>
      </form>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <script src="chat.js"></script>
</body>
</html>
