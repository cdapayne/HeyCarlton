<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carlton Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cyber: { 50: '#ecfeff', 100: '#cffafe', 200: '#a5f3fc', 300: '#67e8f9', 400: '#22d3ee', 500: '#06b6d4', 600: '#0891b2', 700: '#0e7490', 800: '#155e75', 900: '#164e63' },
            neon: { green: '#39FF14', blue: '#00f0ff', pink: '#ff00e6', purple: '#b026ff' }
          },
          animation: {
            'glow-pulse': 'glow-pulse 2s ease-in-out infinite alternate',
            'scan-line': 'scan-line 4s linear infinite',
            'border-glow': 'border-glow 3s ease-in-out infinite',
          },
          keyframes: {
            'glow-pulse': { '0%': { boxShadow: '0 0 5px rgba(0,240,255,0.3), 0 0 20px rgba(0,240,255,0.1)' }, '100%': { boxShadow: '0 0 15px rgba(0,240,255,0.5), 0 0 40px rgba(0,240,255,0.2)' } },
            'scan-line': { '0%': { transform: 'translateY(-100%)' }, '100%': { transform: 'translateY(100vh)' } },
            'border-glow': { '0%, 100%': { borderColor: 'rgba(0,240,255,0.3)' }, '50%': { borderColor: 'rgba(0,240,255,0.8)' } },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@5/dark.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
  <style>
    * { scrollbar-width: thin; scrollbar-color: #1e40af transparent; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #00f0ff, #1e40af); border-radius: 3px; }

    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

    /* Scan-line overlay effect */
    #app::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,240,255,0.4), transparent);
      animation: scan-line 4s linear infinite;
      z-index: 100;
      pointer-events: none;
    }

    /* Grid background pattern */
    .grid-bg {
      background-image:
        linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Sidebar */
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 280px;
      display: flex; flex-direction: column;
      background: linear-gradient(180deg, rgba(2,6,23,0.98), rgba(15,23,42,0.95));
      border-right: 1px solid rgba(0,240,255,0.15);
      backdrop-filter: blur(12px);
      overflow-y: auto;
      z-index: 30;
    }

    #chat { margin-left: 280px; min-height: 100vh; display: flex; flex-direction: column; }

    /* Messages */
    .message { animation: msgSlide 0.3s ease-out; }
    @keyframes msgSlide {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Bubble animations */
    .bubble { opacity: 0; }
    .bubble.fly-in-left { animation: fly-left 0.5s ease-out forwards; }
    .bubble.fly-in-right { animation: fly-right 0.5s ease-out forwards; }
    .bubble.fly-in-top { animation: fly-top 0.5s ease-out forwards; }
    .bubble.fly-in-bottom { animation: fly-bottom 0.5s ease-out forwards; }
    @keyframes fly-left { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fly-right { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fly-top { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fly-bottom { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* Code blocks */
    pre {
      background: rgba(2,6,23,0.9) !important;
      border: 1px solid rgba(0,240,255,0.2);
      box-shadow: 0 0 15px rgba(0,240,255,0.08), inset 0 1px 0 rgba(255,255,255,0.03);
      border-radius: 12px;
      padding: 1rem;
      overflow-x: auto;
      font-size: 14px;
    }

    /* Marquee */
    .marquee { overflow: hidden; white-space: nowrap; }
    .marquee-content {
      display: inline-block;
      padding-left: 100%;
      animation: marquee 500s linear infinite;
    }
    .marquee-content span { padding-right: 2rem; position: relative; }
    .marquee-content span::before { content: '\2022'; color: #00f0ff; margin-right: 0.5rem; }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

    /* Model selector glow */
    #model-select { text-shadow: 0 0 8px rgba(0,240,255,0.5); }
    #model-select option { background: #0f172a; color: #e2e8f0; }

    /* Neon text helper */
    .neon-text { text-shadow: 0 0 7px rgba(0,240,255,0.6), 0 0 20px rgba(0,240,255,0.3); }
    .neon-text-green { text-shadow: 0 0 7px rgba(57,255,20,0.6), 0 0 20px rgba(57,255,20,0.3); }

    /* Ticker label */
    .ticker-label { font-weight: bold; }

    /* Mobile */
    @media (max-width: 900px) {
      #sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
      body.sidebar-open #sidebar { transform: translateX(0); }
      #chat { margin-left: 0 !important; }
    }
  </style>
</head>
<body class="bg-[#020617] text-slate-100 overflow-hidden">
  <div id="app" class="grid-bg relative min-h-screen">

    <!-- Sidebar -->
    <aside id="sidebar" class="p-4 gap-3">
      <!-- Logo area -->
      <div class="flex items-center gap-3 mb-4 pb-4 border-b border-cyan-500/20">
        <img src="heyCarlton.png" id="logo" alt="Carlton logo" class="h-10 w-auto drop-shadow-[0_0_8px_rgba(0,240,255,0.5)]">
        <div>
          <h1 class="text-lg font-bold neon-text tracking-wide">CARLTON</h1>
          <p class="text-[10px] text-cyan-400/60 uppercase tracking-[0.3em]">AI Command Center</p>
        </div>
      </div>

      <section class="flex flex-col gap-2">
        <button id="new-project-btn" class="flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm font-medium
          bg-gradient-to-r from-cyan-500/10 to-blue-500/10 border border-cyan-500/20
          hover:border-cyan-400/50 hover:bg-cyan-500/15 hover:shadow-[0_0_15px_rgba(0,240,255,0.15)]
          transition-all duration-300 text-cyan-300">
          <i class="fas fa-folder-plus text-cyan-400"></i> New Project
        </button>
        <button id="open-codex" class="flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm font-medium
          bg-gradient-to-r from-purple-500/10 to-pink-500/10 border border-purple-500/20
          hover:border-purple-400/50 hover:bg-purple-500/15 hover:shadow-[0_0_15px_rgba(176,38,255,0.15)]
          transition-all duration-300 text-purple-300">
          <i class="fas fa-book-open text-purple-400"></i> Open Codex
        </button>
      </section>

      <div class="mt-4 pt-3 border-t border-cyan-500/10">
        <h2 class="text-[11px] uppercase tracking-[0.2em] text-slate-500 mb-2 flex items-center gap-2">
          <i class="fas fa-folder-open text-cyan-500/50"></i> Projects
        </h2>
        <ul id="project-list" class="flex flex-col gap-1"></ul>
      </div>
    </aside>

    <!-- Main Chat -->
    <main id="chat">
      <!-- Ad banner -->
      <div id="amazon-ad-banner" class="w-full flex justify-center">
        <script type="text/javascript">
          amzn_assoc_ad_type = "responsive_search_widget";
          amzn_assoc_tracking_id = "YOUR_APP_ID";
          amzn_assoc_marketplace = "amazon";
          amzn_assoc_region = "US";
          amzn_assoc_default_search_phrase = "tech gadgets";
          amzn_assoc_default_category = "All";
          amzn_assoc_linkid = "YOUR_APP_KEY";
          amzn_assoc_placement = "adunit0";
          amzn_assoc_search_bar = "true";
          amzn_assoc_title = "Shop Related Products";
        </script>
        <script src="//z-na.amazon-adsystem.com/widgets/onejs?MarketPlace=US"></script>
      </div>

      <!-- Header -->
      <header class="sticky top-0 z-20 flex items-center gap-3 px-4 py-3
        bg-gradient-to-r from-[#020617]/95 via-[#0f172a]/95 to-[#020617]/95
        border-b border-cyan-500/15 backdrop-blur-xl
        shadow-[0_4px_30px_rgba(0,0,0,0.5),0_0_40px_rgba(0,240,255,0.05)]">

        <!-- Status indicator -->
        <div class="flex items-center gap-2">
          <div class="relative">
            <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
            <div class="absolute inset-0 w-2 h-2 rounded-full bg-emerald-400 animate-ping opacity-30"></div>
          </div>
          <span class="text-[10px] uppercase tracking-[0.15em] text-emerald-400/80 font-medium hidden sm:inline">Online</span>
        </div>

        <div id="top-info" class="flex-1 text-slate-400 text-sm"></div>

        <!-- Model selector -->
        <div class="relative group">
          <div class="absolute -inset-0.5 bg-gradient-to-r from-cyan-500/20 to-blue-500/20 rounded-lg blur opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
          <select id="model-select" class="relative bg-[#0a1628] text-cyan-300 text-sm font-mono
            border border-cyan-500/30 rounded-lg px-3 py-2 pr-8
            hover:border-cyan-400/60 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400/30
            transition-all duration-300 cursor-pointer appearance-none
            bg-[url('data:image/svg+xml;charset=UTF-8,%3csvg%20xmlns%3d%22http%3a%2f%2fwww.w3.org%2f2000%2fsvg%22%20width%3d%2212%22%20height%3d%2212%22%20viewBox%3d%220%200%2012%2012%22%3e%3cpath%20fill%3d%22%2300f0ff%22%20d%3d%22M6%208L1%203h10z%22%2f%3e%3c%2fsvg%3e')]
            bg-no-repeat bg-[right_0.5rem_center]">
            <option value="">Loading models...</option>
          </select>
        </div>

        <!-- Settings -->
        <button id="settings-btn" class="relative p-2.5 rounded-lg
          bg-slate-800/50 border border-slate-700/50 text-slate-400
          hover:text-cyan-400 hover:border-cyan-500/30 hover:bg-cyan-500/10
          hover:shadow-[0_0_12px_rgba(0,240,255,0.15)]
          transition-all duration-300">
          <i class="fas fa-cog"></i>
        </button>

        <!-- Balance -->
        <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-amber-500/10 border border-amber-500/20">
          <i class="fas fa-coins text-amber-400 text-xs"></i>
          <span id="balance" class="text-amber-400 text-sm font-mono font-bold"></span>
        </div>
      </header>

      <!-- Messages -->
      <div id="messages" class="flex-1 p-6 pb-32 overflow-y-auto flex flex-col gap-4" style="height: calc(100vh - 140px);"></div>

      <!-- Input Area -->
      <div id="input-area" class="sticky bottom-0 flex flex-col
        bg-gradient-to-t from-[#020617] via-[#020617]/98 to-transparent">
        <form id="prompt-form" class="flex gap-3 px-4 py-3 sm:flex-row flex-col">
          <div class="flex-1 relative group">
            <div class="absolute -inset-0.5 bg-gradient-to-r from-cyan-500/20 via-blue-500/20 to-purple-500/20 rounded-xl blur opacity-50 group-focus-within:opacity-100 transition-opacity duration-300"></div>
            <input type="text" id="prompt-input" placeholder="Enter command..."
              class="relative w-full px-4 py-3 rounded-xl text-sm
              bg-[#0a1628] text-slate-100 placeholder-slate-500
              border border-cyan-500/20 focus:border-cyan-400/60
              focus:ring-2 focus:ring-cyan-400/20 focus:outline-none
              transition-all duration-300 font-mono">
          </div>
          <button type="submit" class="relative px-6 py-3 rounded-xl text-sm font-semibold
            bg-gradient-to-r from-cyan-500 to-blue-600 text-white
            hover:from-cyan-400 hover:to-blue-500
            shadow-[0_0_20px_rgba(0,240,255,0.25)] hover:shadow-[0_0_30px_rgba(0,240,255,0.4)]
            transition-all duration-300 active:scale-95 flex items-center gap-2 whitespace-nowrap">
            <i class="fas fa-paper-plane text-xs"></i> TRANSMIT
          </button>
        </form>

        <!-- Ticker -->
        <div id="rss-ticker" class="flex items-center text-xs border-t border-cyan-500/10
          bg-[#020617]/90 backdrop-blur-sm">
          <span class="ticker-label px-3 py-2 bg-cyan-500/10 text-cyan-400/80 border-r border-cyan-500/10"></span>
          <img src="pbnw.png" id="ticker-logo" alt="Ticker logo" class="h-5 w-auto ml-2 opacity-60">
          <div id="rss-marquee" class="marquee p-2 flex-1 text-slate-400"></div>
          <div id="weather" class="flex items-center px-3 text-cyan-300/80 border-l border-cyan-500/10"></div>
          <div id="datetime" class="flex items-center px-3 text-slate-500 font-mono text-[11px] border-l border-cyan-500/10"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="hidden fixed inset-0 z-50 bg-black/70 backdrop-blur-sm items-center justify-center">
    <div class="bg-[#0f172a] border border-cyan-500/20 rounded-2xl p-6 w-full max-w-md
      shadow-[0_0_50px_rgba(0,240,255,0.1)] animate-[msgSlide_0.3s_ease-out]">
      <div class="flex items-center gap-2 mb-4 pb-3 border-b border-cyan-500/10">
        <i class="fas fa-cog text-cyan-400"></i>
        <h3 class="text-lg font-bold neon-text">Settings</h3>
      </div>
      <form id="settings-form" class="flex flex-col gap-4">
        <div>
          <label class="text-[11px] uppercase tracking-wider text-slate-500 mb-2 block">RSS Feeds</label>
          <div id="rss-options" class="flex flex-col gap-2"></div>
        </div>
        <div class="flex flex-col gap-2 p-3 rounded-lg bg-slate-800/50 border border-slate-700/50">
          <label class="text-[11px] uppercase tracking-wider text-slate-500">Add Custom Feed</label>
          <input type="text" id="custom-feed-name" class="px-3 py-2 bg-[#0a1628] text-slate-200 rounded-lg border border-slate-700/50 focus:border-cyan-500/50 focus:outline-none text-sm" placeholder="Feed Name">
          <input type="text" id="custom-feed-url" class="px-3 py-2 bg-[#0a1628] text-slate-200 rounded-lg border border-slate-700/50 focus:border-cyan-500/50 focus:outline-none text-sm" placeholder="Feed URL">
          <button type="button" id="add-feed-btn" class="px-3 py-2 bg-blue-600/20 border border-blue-500/30 text-blue-400 rounded-lg hover:bg-blue-600/30 transition-all text-sm">
            <i class="fas fa-plus mr-1"></i> Add Feed
          </button>
        </div>
        <label class="flex items-center gap-3">
          <span class="text-[11px] uppercase tracking-wider text-slate-500">Zip Code</span>
          <input type="text" id="zip-input" class="px-3 py-2 bg-[#0a1628] text-slate-200 rounded-lg border border-slate-700/50 focus:border-cyan-500/50 focus:outline-none w-28 text-sm" placeholder="e.g. 10001">
        </label>
        <button type="submit" class="px-4 py-2.5 rounded-lg text-sm font-semibold
          bg-gradient-to-r from-emerald-500 to-green-600 text-white
          hover:from-emerald-400 hover:to-green-500
          shadow-[0_0_15px_rgba(16,185,129,0.25)] transition-all duration-300">
          <i class="fas fa-save mr-1"></i> Save Configuration
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <script src="chat.js"></script>
</body>
</html>
